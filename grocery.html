<!DOCTYPE html>
<html>
<head>

<title>Grocery Stores - Jhilu</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

/* Header */

.header{
background:#1b5e20;
color:white;
padding:20px;
text-align:center;
}

/* Container */

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

/* Store Grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* Store Card */

.store{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.store:hover{
transform:translateY(-6px);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.store h3{
color:#1b5e20;
margin-top:0;
}

/* Button */

.call-btn{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#2e7d32;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
}

/* Mobile */

@media(max-width:600px){

.container{
padding:20px;
}

}

</style>

</head>

<body>

<div class="header">
<h1>Grocery Stores in Jhilu</h1>
</div>

<div class="container">

<div class="grid">

<div class="store">
<h3>Priyam Grocery Store</h3>
<p><b>Owner:</b> Priyam</p>
<p><b>Phone:</b> 9876543210</p>
<p><b>Location:</b> Near School</p>

<a class="call-btn" href="tel:9876543210">Call</a>
</div>

<div class="store">
<h3>Raju General Store</h3>
<p><b>Owner:</b> Raju</p>
<p><b>Phone:</b> 9876543211</p>
<p><b>Location:</b> Main Road</p>

<a class="call-btn" href="tel:9876543211">Call</a>
</div>

</div>

</div>

</body>
</html>
