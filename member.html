<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Members</title>
<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Header */
.header{
background:#2e7d32;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* Search */
#search{
width:90%;
margin:15px auto;
display:block;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

/* Table */
table{
width:95%;
margin:auto;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* Header row */
th{
background:#2e7d32;
color:white;
padding:14px;
text-align:left;
}

/* Data */
td{
padding:14px;
border-bottom:1px solid #eee;
}

/* Hover */
tr:hover{
background:#f1f8f5;
}

/* Mobile fix */
@media(max-width:600px){
th, td{
font-size:14px;
padding:10px;
}
}

</style>

</head>

<body>

<div class="header">
👥 Community Members
</div>

<input type="text" id="search" placeholder="🔍 Search member...">

<table id="memberTable">
<thead>
<tr>
<th>Name</th>
<th>Designation</th>
</tr>
</thead>

<tbody id="memberList"></tbody>
</table>
<script>

const memberURL = "https://docs.google.com/spreadsheets/d/1HbkVzjTLi3QsnDRmwxSGeSebWWXA2sykTtNBwX2Z1uI/gviz/tq?tqx=out:csv&sheet=Sheet%201";

fetch(memberURL)
.then(res=>res.text())
.then(data=>{

let rows = data.trim().split("\n").slice(1);

let container = document.getElementById("memberList");

rows.forEach(r=>{

let c = r.split(",");

// 🔥 remove double quotes
let name = (c[0] || "").replace(/"/g,"").trim();
let role = (c[2] || "").replace(/"/g,"").trim();

if(!name) return;

container.innerHTML += `
<tr>
<td>${name}</td>
<td>${role}</td>
</tr>
`;

});

});

document.getElementById("search").addEventListener("input", function(){

let value = this.value.toLowerCase();
let rows = document.querySelectorAll("#memberTable tbody tr");

rows.forEach(row=>{
row.style.display =
row.innerText.toLowerCase().includes(value) ? "" : "none";
});

});

</script>

</body>
</html>
