<!DOCTYPE html>
<html>
<head>
<title>Local Business Directory</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

/* Header */

h1{
background:#1b5e20;
color:white;
padding:20px;
margin:0;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
max-width:1000px;
margin:auto;
}

/* Card */

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* Card Link */

.card a{
text-decoration:none;
color:#1b5e20;
font-size:20px;
font-weight:bold;
}

/* Mobile */

@media(max-width:600px){

.grid{
padding:20px;
}

.card{
padding:25px;
}

}
</style>

</head>

<body>

<h1>Local Business Directory</h1>

<div class="grid">

<div class="card">
<a href="grocery.html">Grocery Stores</a>
</div>

<div class="card">
<a href="cycle.html">Cycle Repair</a>
</div>

<div class="card">
<a href="sweet.html">Sweet Shops</a>
</div>

<div class="card">
<a href="medical.html">Medical Stores</a>
</div>

</div>

</body>
</html>
